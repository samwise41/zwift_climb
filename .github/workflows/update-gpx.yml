name: Generate GPX Route List

on:
  push:
    paths:
      - 'gpx/**/*.gpx' # Only runs when a GPX file is added/changed
  workflow_dispatch: # Allows you to run it manually from the GitHub website if needed

jobs:
  build-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the bot can save the new file to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Read GPX Files and Build JS
        run: |
          python -c "
          import os, re, json
          gpx_dir = 'gpx'
          routes = []
          if os.path.exists(gpx_dir):
              for f in os.listdir(gpx_dir):
                  if f.endswith('.gpx'):
                      name = f.replace('.gpx', '').replace('_', ' ').title()
                      try:
                          with open(os.path.join(gpx_dir, f), 'r', encoding='utf-8') as file:
                              match = re.search(r'<name>(.*?)</name>', file.read())
                              if match: name = match.group(1).strip()
                      except: pass
                      routes.append({'filename': f, 'name': name})
          routes.sort(key=lambda x: x['name'])
          os.makedirs('js', exist_ok=True)
          with open('js/gpx-list.js', 'w', encoding='utf-8') as out:
              out.write('// AUTO-GENERATED BY GITHUB ACTIONS\nconst gpxLibrary = ' + json.dumps(routes, indent=4) + ';')
          "

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate gpx-list.js from GPX folder"
          file_pattern: "js/gpx-list.js"
