<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpe du Zwift Performance Pacer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Matched to AthleteOS bg-slate-900 */
            --bg-dark: #0f172a; 
            /* Softened for segment borders */
            --bg-panel: #1e293b; 
            --zwift-orange: #fc6719;
            --ahead-green: #4caf50;
            --behind-red: #f44336;
            --prev-color: #888;
            --target-blue: #3daee9;
            --cur-color: #fff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            padding: 10px;
            max-width: 900px; 
            margin: auto;
            touch-action: manipulation; 
        }
        
        .sticky-zone {
            position: sticky;
            top: 0;
            background-color: var(--bg-dark);
            z-index: 100;
            padding: 10px 0;
            border-bottom: 2px solid #1e293b;
            margin-bottom: 15px;
        }

        h2 { text-align: center; margin: 0 0 10px 0; color: var(--zwift-orange); font-size: 1.5em; }
        
        /* Updated Timer Box to White */
        #controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            background-color: #ffffff; 
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .timer-wrapper {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        /* Updated Timer Font Color for White BG */
        #timer {
            font-size: 3em;
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            color: #0f172a; 
        }

        #main-delta {
            font-size: 1.5em;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        #startBtn {
            background-color: var(--zwift-orange);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn:active { background-color: #e05a14; }
        
        .charts-section {
            display: flex;
            flex-direction: column; 
            gap: 15px;
        }
        
        /* Updated Chart Containers to White */
        .chart-container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.05);
        }

        /* Updated Chart Title for White BG */
        .chart-title {
            text-align: center;
            font-size: 0.85em;
            color: #475569;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .chart-wrapper {
            position: relative;
            height: 160px; 
            width: 100%;
        }

        @media (min-width: 768px) {
            .charts-section { flex-direction: row; }
            .chart-container { flex: 1; min-width: 0; }
            .chart-wrapper { height: 220px; }
        }

        /* Segment Styles (Kept dark since they scroll under the white boxes) */
        .segment {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }
        .segment-info { flex: 1.2; }
        .segment-name { font-size: 1em; font-weight: bold; margin-bottom: 3px;}
        .segment-target { color: #94a3b8; font-size: 0.85em; margin-bottom: 2px;}
        .prev-data-row { color: #64748b; font-size: 0.85em; font-style: italic;}
        
        .segment-action { 
            flex: 1.5; 
            text-align: right; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
        }
        
        .split-btn {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 10px 15px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .split-btn:active { background-color: #475569; }
        .split-btn:disabled {
            background-color: #1e293b;
            color: #475569;
            border-color: #1e293b;
            cursor: not-allowed;
        }
        
        .result-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 0.9em;
            line-height: 1.4;
        }
        .time-row { margin-bottom: 4px; white-space: nowrap;}
        .cur-cum { color: var(--cur-color); font-variant-numeric: tabular-nums; font-weight: bold; }
        .cur-seg { color: #94a3b8; font-size: 0.9em;}
        
        .power-input-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }
        
        .undo-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .undo-btn:active { background: #334155; color: white;}

        .power-label { color: #94a3b8; font-size: 0.8em; margin-left: 5px;}
        
        .power-input {
            width: 55px;
            padding: 6px 3px;
            background-color: #1e293b;
            border-radius: 4px;
            text-align: center;
            font-size: 1em;
            font-weight: bold;
            color: white;
            border: 1px solid #1e293b;
        }
        .power-input::placeholder { color: #64748b; font-weight: normal;}
        .power-input:focus { outline: none; border-color: #3daee9; background-color: #334155; }

        .result { font-weight: bold; font-variant-numeric: tabular-nums;}
        .ahead { color: var(--ahead-green); } 
        .behind { color: var(--behind-red); } 
    </style>
</head>
<body>

    <div class="sticky-zone">
        <h2>Alpe Pacer (59:30)</h2>
        
        <div id="controls">
            <div class="timer-wrapper">
                <div id="timer">00:00</div>
                <div id="main-delta"></div>
            </div>
            <button id="startBtn" onclick="startRide()">START</button>
        </div>

        <div class="charts-section">
            <div class="chart-container">
                <div class="chart-title">PACING TREND: Time Ahead (+)</div>
                <div class="chart-wrapper"><canvas id="pacingTrendChart"></canvas></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">COMPARISON: Time (Bars) & Watts (Lines)</div>
                <div class="chart-wrapper"><canvas id="comparisonChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="segmentList"></div>

    <script>
        const segments = [
            { name: "Start to Bend 21", targetStr: "04:25", targetCumSec: 265, targetPower: 250, prevSegSec: 282, prevWatts: 235 }, 
            { name: "Bend 21 to 20",   targetStr: "08:36", targetCumSec: 516, targetPower: 238, prevSegSec: 267, prevWatts: 224 }, 
            { name: "Bend 20 to 19",   targetStr: "09:35", targetCumSec: 575, targetPower: 236, prevSegSec: 63,  prevWatts: 222 }, 
            { name: "Bend 19 to 18",   targetStr: "11:15", targetCumSec: 675, targetPower: 234, prevSegSec: 106, prevWatts: 220 }, 
            { name: "Bend 18 to 17",   targetStr: "13:21", targetCumSec: 801, targetPower: 243, prevSegSec: 134, prevWatts: 229 }, 
            { name: "Bend 17 to 16",   targetStr: "14:30", targetCumSec: 870, targetPower: 230, prevSegSec: 73,  prevWatts: 216 }, 
            { name: "Bend 16 to 15",   targetStr: "17:38", targetCumSec: 1058, targetPower: 241, prevSegSec: 200, prevWatts: 227 }, 
            { name: "Bend 15 to 14",   targetStr: "19:13", targetCumSec: 1153, targetPower: 241, prevSegSec: 101, prevWatts: 227 }, 
            { name: "Bend 14 to 13",   targetStr: "22:52", targetCumSec: 1372, targetPower: 253, prevSegSec: 233, prevWatts: 238 }, 
            { name: "Bend 13 to 12",   targetStr: "25:16", targetCumSec: 1516, targetPower: 250, prevSegSec: 153, prevWatts: 235 }, 
            { name: "Bend 12 to 11",   targetStr: "27:32", targetCumSec: 1652, targetPower: 246, prevSegSec: 145, prevWatts: 231 }, 
            { name: "Bend 11 to 10",   targetStr: "30:11", targetCumSec: 1811, targetPower: 252, prevSegSec: 169, prevWatts: 237 }, 
            { name: "Bend 10 to 9",    targetStr: "33:00", targetCumSec: 1980, targetPower: 248, prevSegSec: 180, prevWatts: 233 }, 
            { name: "Bend 9 to 8",     targetStr: "36:15", targetCumSec: 2175, targetPower: 247, prevSegSec: 207, prevWatts: 232 }, 
            { name: "Bend 8 to 7",     targetStr: "38:45", targetCumSec: 2325, targetPower: 254, prevSegSec: 160, prevWatts: 239 }, 
            { name: "Bend 7 to 6",     targetStr: "44:00", targetCumSec: 2640, targetPower: 259, prevSegSec: 335, prevWatts: 244 }, 
            { name: "Bend 6 to 5",     targetStr: "46:01", targetCumSec: 2761, targetPower: 259, prevSegSec: 129, prevWatts: 244 }, 
            { name: "Bend 5 to 4",     targetStr: "48:09", targetCumSec: 2889, targetPower: 264, prevSegSec: 136, prevWatts: 248 }, 
            { name: "Bend 4 to 3",     targetStr: "51:55", targetCumSec: 3115, targetPower: 280, prevSegSec: 240, prevWatts: 263 }, 
            { name: "Bend 3 to 2",     targetStr: "53:55", targetCumSec: 3235, targetPower: 284, prevSegSec: 128, prevWatts: 267 }, 
            { name: "Bend 2 to 1",     targetStr: "56:24", targetCumSec: 3384, targetPower: 281, prevSegSec: 158, prevWatts: 264 }, 
            { name: "Bend 1 to Banner",targetStr: "59:29", targetCumSec: 3569, targetPower: 308, prevSegSec: 197, prevWatts: 290 }  
        ];

        let startTime = null;
        let timerInterval = null;
        
        let currentActiveIndex = 0;
        let actualCumSecData = new Array(segments.length).fill(null);
        let trendData = new Array(segments.length).fill(null);
        let currentSegTimeData = new Array(segments.length).fill(null);
        let currentSegWattsData = new Array(segments.length).fill(null);

        let pacingTrendChart, comparisonChart;
        
        const prevSegTimeData = segments.map(s => s.prevSegSec);
        const prevSegWattsData = segments.map(s => s.prevWatts);
        const targetWattsData = segments.map(s => s.targetPower);
        
        const targetSegTimeData = segments.map((s, i) => {
            if (i === 0) return s.targetCumSec;
            return s.targetCumSec - segments[i-1].targetCumSec;
        });

        const chartLabels = segments.map((seg, i) => {
            if (i === 0) return "Start";
            if (i === segments.length - 1) return "Banner";
            return "B" + seg.name.split(" to ")[1];
        });

        function formatTime(totalSeconds) {
            if (totalSeconds === null) return "--:--";
            const absSec = Math.abs(totalSeconds);
            const m = Math.floor(absSec / 60).toString().padStart(2, '0');
            const s = (absSec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateMainDelta(delta) {
            const el = document.getElementById('main-delta');
            if (delta === null) {
                el.textContent = "";
                el.className = "";
                return;
            }
            if (delta >= 0) {
                el.textContent = `-${formatTime(delta)}`;
                el.className = "ahead";
            } else {
                el.textContent = `+${formatTime(Math.abs(delta))}`;
                el.className = "behind";
            }
        }

        function initCharts() {
            // UPDATED DEFAULTS FOR WHITE BACKGROUND
            Chart.defaults.color = '#64748b'; // Darker text for axes
            Chart.defaults.borderColor = '#e2e8f0'; // Light gray grid lines
            Chart.defaults.font.size = 10;

            const ctxTrend = document.getElementById('pacingTrendChart').getContext('2d');
            pacingTrendChart = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Time Ahead/Behind', data: trendData,
                        borderColor: '#fc6719', backgroundColor: 'rgba(252, 103, 25, 0.15)',
                        borderWidth: 2, pointBackgroundColor: '#fff', pointRadius: 3,
                        fill: 'origin', tension: 0.1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let val = context.raw;
                                    if (val === null) return '';
                                    let sign = val >= 0 ? '+' : '-';
                                    return ` ${sign}${formatTime(val)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            title: { display: false }, 
                            ticks: { 
                                stepSize: 30,
                                callback: function(value) {
                                    let sign = value >= 0 ? '+' : '-';
                                    return `${sign}${formatTime(value)}`;
                                }
                            } 
                        },
                        x: { ticks: { maxRotation: 45, minRotation: 45 } }
                    }
                }
            });

            const ctxComp = document.getElementById('comparisonChart').getContext('2d');
            comparisonChart = new Chart(ctxComp, {
                data: {
                    labels: chartLabels,
                    datasets: [
                        { type: 'line', label: 'Prev W', data: prevSegWattsData, borderColor: '#888', borderDash: [1, 2], borderWidth: 1.5, fill: false, pointRadius: 0, yAxisID: 'y1' },
                        { type: 'line', label: 'Target W', data: targetWattsData, borderColor: '#3daee9', borderDash: [6, 4], borderWidth: 2, fill: false, pointRadius: 0, yAxisID: 'y1' },
                        { type: 'line', label: 'Cur W', data: currentSegWattsData, borderColor: '#4caf50', borderDash: [], borderWidth: 3, fill: false, pointRadius: 2, yAxisID: 'y1' },
                        
                        { type: 'bar', label: 'Prev Time', data: prevSegTimeData, backgroundColor: 'rgba(136, 136, 136, 0.4)', barPercentage: 0.9, categoryPercentage: 0.8, yAxisID: 'y' },
                        { type: 'bar', label: 'Target Time', data: targetSegTimeData, backgroundColor: 'rgba(61, 174, 233, 0.4)', barPercentage: 0.9, categoryPercentage: 0.8, yAxisID: 'y' },
                        { type: 'bar', label: 'Cur Time', data: currentSegTimeData, backgroundColor: 'rgba(76, 175, 80, 0.7)', barPercentage: 0.9, categoryPercentage: 0.8, yAxisID: 'y' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { boxWidth: 10, font: { size: 9 }, padding: 5 } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    let val = context.raw;
                                    if (val === null) return '';
                                    if (context.dataset.yAxisID === 'y') {
                                        return `${label}: ${formatTime(val)}`;
                                    } else {
                                        return `${label}: ${val}W`;
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            type: 'linear', position: 'left', title: { display: false }, min: 0, 
                            ticks: { callback: value => formatTime(value) } 
                        },
                        y1: { 
                            type: 'linear', position: 'right', title: { display: false }, grid: { drawOnChartArea: false }, min: 150, suggestedMax: 350, 
                            ticks: { callback: value => value + 'W' } 
                        },
                        x: { ticks: { maxRotation: 45, minRotation: 45 }, stacked: false }
                    }
                }
            });
        }

        function renderActionDiv(i) {
            const actionDiv = document.getElementById(`action-${i}`);
            if (!actionDiv) return;

            if (actualCumSecData[i] !== null) {
                const currentCumSec = actualCumSecData[i];
                const prevCumSec = i > 0 ? actualCumSecData[i-1] : 0;
                const segDuration = currentCumSec - prevCumSec;
                const delta = segments[i].targetCumSec - currentCumSec;
                
                let resTxt = delta >= 0 ? `-${formatTime(delta)} Ahead` : `+${formatTime(delta)} Behind`;
                let resCls = delta >= 0 ? 'ahead' : 'behind';

                const isLastCompleted = (i === currentActiveIndex - 1);
                const undoBtnHtml = isLastCompleted ? `<button class="undo-btn" onclick="undoSplit(${i})">↺ Undo</button>` : '';
                
                const existingPower = currentSegWattsData[i] !== null ? currentSegWattsData[i] : '';

                actionDiv.innerHTML = `
                    <div class="result-container">
                        <div class="time-row">
                            <span class="cur-cum">${formatTime(currentCumSec)}</span> |
                            <span class="cur-seg">Seg: ${formatTime(segDuration)}</span>
                        </div>
                        <div class="time-row result ${resCls}">${resTxt}</div>
                        <div class="power-input-container">
                            ${undoBtnHtml}
                            <span class="power-label">Avg W:</span>
                            <input type="tel" id="power-${i}" class="power-input" placeholder="--" pattern="[0-9]*" inputmode="numeric" value="${existingPower}" oninput="updateComparisonWatts(${i}, this)">
                        </div>
                    </div>
                `;
                
                if (existingPower !== '') {
                    const inputEl = document.getElementById(`power-${i}`);
                    applyPowerInputStyles(inputEl, parseInt(existingPower), segments[i].targetPower);
                }
                
            } else if (i === currentActiveIndex) {
                const disabledState = !startTime ? 'disabled' : '';
                actionDiv.innerHTML = `<button class="split-btn" ${disabledState} onclick="recordSplit(${i})">Split</button>`;
            } else {
                actionDiv.innerHTML = `<button class="split-btn" disabled>Split</button>`;
            }
        }

        function applyPowerInputStyles(inputEl, userPower, targetPower) {
            if (userPower >= targetPower) {
                inputEl.style.border = '1px solid var(--ahead-green)';
                inputEl.style.color = 'var(--ahead-green)';
            } else {
                inputEl.style.border = '1px solid var(--behind-red)';
                inputEl.style.color = 'var(--behind-red)';
            }
        }

        function startRide() {
            if (timerInterval) return; 
            startTime = Date.now();
            document.getElementById('startBtn').style.backgroundColor = '#334155';
            document.getElementById('startBtn').innerText = "RIDING";
            
            renderActionDiv(currentActiveIndex); 
            
            timerInterval = setInterval(() => {
                const elapsedSec = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = formatTime(elapsedSec);
            }, 1000);
        }

        function updateComparisonWatts(index, element) {
            const val = element.value;
            if (val === '') {
                currentSegWattsData[index] = null;
                element.style.border = '1px solid #1e293b';
                element.style.color = 'var(--cur-color)'; 
            } else {
                const watts = parseInt(val);
                if (!isNaN(watts)) {
                    currentSegWattsData[index] = watts;
                    applyPowerInputStyles(element, watts, segments[index].targetPower);
                }
            }
            if (comparisonChart) comparisonChart.update('none'); 
        }

        function recordSplit(index) {
            if (!startTime || index !== currentActiveIndex) return; 

            const currentCumSec = Math.floor((Date.now() - startTime) / 1000);
            actualCumSecData[index] = currentCumSec;
            
            const prevCumSec = index > 0 ? actualCumSecData[index-1] : 0;
            currentSegTimeData[index] = currentCumSec - prevCumSec;
            
            const splitDelta = segments[index].targetCumSec - currentCumSec;
            trendData[index] = splitDelta;
            
            updateMainDelta(splitDelta);
            currentActiveIndex = index + 1; 

            if (pacingTrendChart) pacingTrendChart.update();
            if (comparisonChart) comparisonChart.update();

            renderActionDiv(index);
            if (index > 0) renderActionDiv(index - 1); 
            if (index + 1 < segments.length) renderActionDiv(index + 1); 
        }

        function undoSplit(index) {
            if (index !== currentActiveIndex - 1) return;

            actualCumSecData[index] = null;
            currentSegTimeData[index] = null;
            trendData[index] = null;
            currentSegWattsData[index] = null;

            if (index > 0) {
                const prevIndex = index - 1;
                const prevDelta = segments[prevIndex].targetCumSec - actualCumSecData[prevIndex];
                updateMainDelta(prevDelta);
            } else {
                updateMainDelta(null);
            }

            currentActiveIndex = index; 

            if (pacingTrendChart) pacingTrendChart.update();
            if (comparisonChart) comparisonChart.update();

            renderActionDiv(index);
            if (index > 0) renderActionDiv(index - 1);
            if (index + 1 < segments.length) renderActionDiv(index + 1);
        }

        function init() {
            try {
                initCharts();
            } catch (e) {
                console.warn("Charts failed to load (likely offline), continuing with pacing timer.", e);
            }

            const list = document.getElementById('segmentList');
            let runningPrevCumSec = 0;

            segments.forEach((seg, index) => {
                const prevTargetCumSec = index > 0 ? segments[index-1].targetCumSec : 0;
                const targetSegSec = seg.targetCumSec - prevTargetCumSec;
                runningPrevCumSec += seg.prevSegSec;

                const div = document.createElement('div');
                div.className = 'segment';
                div.innerHTML = `
                    <div class="segment-info">
                        <div class="segment-name">${seg.name}</div>
                        <div class="segment-target">Target: ${formatTime(seg.targetCumSec)} (${formatTime(targetSegSec)}) @ ${seg.targetPower}W</div>
                        <div class="prev-data-row">Prev: ${formatTime(runningPrevCumSec)} (${formatTime(seg.prevSegSec)}) @ ${seg.prevWatts}W</div>
                    </div>
                    <div class="segment-action" id="action-${index}"></div>
                `;
                list.appendChild(div);
                renderActionDiv(index); 
            });
        }

        init();
    </script>
</body>
</html>
