<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Climb Pacer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; 
            --bg-panel: #1e293b; 
            --zwift-orange: #fc6719;
            --ahead-green: #4caf50;
            --behind-red: #f44336;
            --target-blue: #3daee9;
            --cur-color: #fff;
        }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-dark); color: #ffffff; padding: 10px; max-width: 900px; margin: auto; }
        .sticky-zone { position: sticky; top: 0; background-color: var(--bg-dark); z-index: 100; padding: 10px 0; border-bottom: 2px solid #1e293b; margin-bottom: 15px; }
        h2 { text-align: center; margin: 0 0 10px 0; color: var(--zwift-orange); font-size: 1.5em; }
        
        /* Strava Auth & Data Settings Zone */
        #strava-auth-zone { text-align: center; margin-bottom: 15px; }
        .strava-btn { background-color: #fc4c02; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block; cursor: pointer; border: none;}
        .strava-btn:active { background-color: #e34402; }
        .status-text { font-weight: bold; display: none; margin-bottom: 10px; padding: 8px; border-radius: 4px; background-color: var(--bg-panel); }

        /* Calculator Styles */
        .calculator-box { background-color: #ffffff; color: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #cbd5e1; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .calc-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .calc-input { background: #f1f5f9; border: 1px solid #94a3b8; color: #0f172a; padding: 8px; border-radius: 4px; font-size: 1em; width: 100%; max-width: 140px; font-weight: bold; }
        .calc-btn { background-color: var(--target-blue); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s;}
        .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Slider Styles */
        .slider-container { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 0.8em; color: #475569; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--zwift-orange); }

        /* Timer & Charts */
        #controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background-color: #ffffff; padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; }
        .timer-wrapper { display: flex; align-items: baseline; gap: 12px; }
        #timer { font-size: 3em; font-variant-numeric: tabular-nums; font-weight: bold; color: #0f172a; }
        #main-delta { font-size: 1.5em; font-weight: bold; }
        #startBtn { background-color: var(--zwift-orange); color: white; border: none; padding: 12px 25px; font-size: 1.2em; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s;}
        #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .charts-section { display: flex; flex-direction: column; gap: 15px; }
        .chart-container { background-color: #ffffff; border-radius: 8px; padding: 10px; border: 1px solid #cbd5e1; height: 180px; }
        .chart-title { text-align: center; font-size: 0.85em; color: #475569; font-weight: bold; }
        
        /* Segments */
        .segment { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .segment-info { flex: 1.2; }
        .segment-name { font-size: 1em; font-weight: bold; margin-bottom: 3px; }
        .segment-target { color: #94a3b8; font-size: 0.85em; margin-bottom: 2px; }
        .prev-data-row { color: #64748b; font-size: 0.85em; font-style: italic; }
        .segment-action { flex: 1.5; text-align: right; }
        .split-btn { background-color: #334155; color: white; border: 1px solid #475569; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .split-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result-container { display: flex; flex-direction: column; align-items: flex-end; font-size: 0.9em; line-height: 1.4; }
        .ahead { color: var(--ahead-green); } 
        .behind { color: var(--behind-red); } 
    </style>
</head>
<body>

    <div class="sticky-zone">
        <h2 id="main-title">Climb Pacer</h2>
        
        <div id="strava-auth-zone">
            <a href="/api/auth" id="strava-btn" class="strava-btn">Connect Strava to fetch PR</a>
            <div id="strava-status" class="status-text"></div>
        </div>

        <div id="data-settings-box" class="calculator-box" style="display: none; background-color: #f8fafc;">
            <div class="calc-row">
                <label style="font-weight: bold;">Select Climb:</label>
                <select id="climbSelect" class="calc-input"></select>
            </div>
            <div class="calc-row">
                <label style="font-weight: bold;">Data to Grab:</label>
                <select id="attemptSelect" class="calc-input">
                    <option value="best">Best (Last 50)</option>
                    <option value="recent">Most Recent</option>
                </select>
            </div>
            <button class="calc-btn" style="background-color: var(--zwift-orange);" onclick="fetchUserData()">Fetch My Data</button>
        </div>

        <div class="calculator-box">
            <div class="calc-row">
                <label style="font-weight: bold;">Target Time:</label>
                <input type="text" id="targetTimeInput" class="calc-input" placeholder="00:00" value="00:00" style="text-align: center; max-width: 80px;">
            </div>
            
            <div class="slider-container">
                <div class="slider-labels">
                    <span>Pos Split (Start Fast)</span>
                    <span>Even</span>
                    <span>Neg Split (End Fast)</span>
                </div>
                <input type="range" id="splitSlider" min="-10" max="10" value="0">
            </div>
            
            <button class="calc-btn" id="calcBtn" onclick="applyNewTarget()" disabled>Calculate Pacing Plan</button>
        </div>

        <div id="controls">
            <div class="timer-wrapper">
                <div id="timer">00:00</div>
                <div id="main-delta"></div>
            </div>
            <button id="startBtn" onclick="startRide()" disabled>START</button>
        </div>

        <div class="charts-section">
            <div class="chart-container">
                <div class="chart-title">PACING TREND: Time Ahead (+)</div>
                <div style="position: relative; height: 140px; width: 100%;">
                    <canvas id="pacingTrendChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="segmentList"></div>

    <script>
        // --- 1. Core State ---
        let stravaAccessToken = null;
        let climbsConfig = [];
        let currentClimb = null;
        let isDataLoaded = false;

        let baseSegments = [];
        let activeSegments = [];
        let startTime = null;
        let timerInterval = null;
        let currentActiveIndex = 0;
        let actualCumSecData = [];
        let trendData = [];
        let pacingTrendChart;

        // --- 2. Initialization & Local Storage ---
        async function loadSegmentsConfig() {
            try {
                // Fetch the segments list you stored in GitHub
                const res = await fetch('./segments.json?t=' + Date.now());
                climbsConfig = await res.json();
                
                const selectEl = document.getElementById('climbSelect');
                climbsConfig.forEach((climb, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = climb.name;
                    selectEl.appendChild(opt);
                });

                selectEl.addEventListener('change', (e) => loadClimbSkeleton(climbsConfig[e.target.value]));
                
                // Load the first climb as the default skeleton
                if(climbsConfig.length > 0) {
                    loadClimbSkeleton(climbsConfig[0]);
                }
            } catch (e) {
                console.error("Could not load segments.json.", e);
                document.getElementById('main-title').innerText = "Error: segments.json missing";
            }
        }

        function loadClimbSkeleton(climb) {
            currentClimb = climb;
            isDataLoaded = false;
            document.getElementById('main-title').innerText = `${climb.name} Pacer`;
            document.getElementById('targetTimeInput').value = climb.defaultTime;
            
            document.getElementById('calcBtn').disabled = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('strava-status').style.display = 'none';

            // Build empty skeleton array based on the chosen climb's sub-segments
            baseSegments = climb.subSegments.map(name => ({
                name: name,
                targetCumSec: null, targetPower: null, prevSegSec: null, prevWatts: null
            }));
            
            applyNewTarget(); // Render the empty UI
        }

        // --- 3. Strava API Fetcher ---
        async function fetchUserData() {
            if (!stravaAccessToken || !currentClimb) return;

            const statusEl = document.getElementById('strava-status');
            statusEl.innerText = `⏳ Searching Strava for your ${currentClimb.name} history...`;
            statusEl.style.display = 'block';
            statusEl.className = "status-text"; 

            const attemptType = document.getElementById('attemptSelect').value;
            const fetchLimit = attemptType === 'best' ? 50 : 1;

            try {
                // Step A: Search Segment Efforts
                const effortsRes = await fetch(`https://www.strava.com/api/v3/segment_efforts?segment_id=${currentClimb.id}&per_page=${fetchLimit}`, {
                    headers: { 'Authorization': `Bearer ${stravaAccessToken}` }
                });
                let effortsData = await effortsRes.json();

                if (!effortsData || effortsData.length === 0 || effortsData.errors) {
                    statusEl.innerText = `❌ No efforts found for ${currentClimb.name}.`;
                    statusEl.classList.add("behind");
                    return;
                }

                // If looking for the Best, sort the 50 results by fastest time
                if (attemptType === 'best') {
                    effortsData.sort((a, b) => a.elapsed_time - b.elapsed_time);
                }

                const targetEffort = effortsData[0];
                const activityId = targetEffort.activity.id;

                statusEl.innerText = `⏳ Loading full activity to map the segments...`;

                // Step B: Fetch Full Activity to map sub-segments
                const activityRes = await fetch(`https://www.strava.com/api/v3/activities/${activityId}`, {
                    headers: { 'Authorization': `Bearer ${stravaAccessToken}` }
                });
                const activityData = await activityRes.json();
                const segmentEfforts = activityData.segment_efforts;

                let personalizedSegments = [];

                // Match Strava's data against your segments.json list
                let missingSegments = [];
                for (let targetName of currentClimb.subSegments) {
                    // Smart regex to find your name inside Strava's longer name
                    // \b prevents "2 to 1" from matching "12 to 11"
                    const regex = new RegExp("\\b" + targetName + "(?:\\b|\\s|$)", "i");
                    const match = segmentEfforts.find(seg => regex.test(seg.name));
                    
                    if (match) {
                        personalizedSegments.push({
                            name: targetName,
                            prevSegSec: match.elapsed_time,
                            prevWatts: Math.round(match.average_watts || 0),
                            targetCumSec: null, targetPower: null
                        });
                    } else {
                        missingSegments.push(targetName);
                    }
                }

                if (missingSegments.length === 0) {
                    baseSegments = personalizedSegments; 
                    isDataLoaded = true; // Unlock the UI!

                if (personalizedSegments.length === currentClimb.subSegments.length) {
                    baseSegments = personalizedSegments; 
                    isDataLoaded = true; // Unlock the UI!
                    
                    document.getElementById('calcBtn').disabled = false;
                    document.getElementById('startBtn').disabled = false;

                    applyNewTarget(); // Calculate and populate targets
                    
                    statusEl.innerText = `✓ ${attemptType === 'best' ? 'PR' : 'Recent'} Loaded! Ready to pace.`;
                    statusEl.classList.add("ahead");
                } else {
                    statusEl.innerText = `⚠️ Found activity, but some sub-segments were missing.`;
                    statusEl.classList.add("behind");
                }
            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ Connection Error with Strava.";
                statusEl.classList.add("behind");
            }
        }

        // Check URL for Auth Token on load
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('access_token') || urlParams.get('code') || urlParams.get('token'); 
        
        if (token) {
            stravaAccessToken = token;
            document.getElementById('strava-btn').style.display = 'none';
            document.getElementById('data-settings-box').style.display = 'flex'; // Reveal the settings!
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // --- 4. Pacing Calculator Logic ---
        function parseTimeToSeconds(timeStr) {
            const parts = timeStr.split(':');
            return (parseInt(parts[0]) * 60) + parseInt(parts[1]);
        }

        function formatTime(totalSeconds) {
            if (totalSeconds === null || totalSeconds === undefined || isNaN(totalSeconds)) return "--:--";
            const absSec = Math.abs(Math.round(totalSeconds));
            const m = Math.floor(absSec / 60).toString().padStart(2, '0');
            const s = (absSec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function applyNewTarget() {
            if (!isDataLoaded) {
                renderList(); // Just render the empty skeleton
                return;
            }

            const targetSeconds = parseTimeToSeconds(document.getElementById('targetTimeInput').value);
            const sliderVal = parseInt(document.getElementById('splitSlider').value) / 100;

            const historicalTotal = baseSegments.reduce((sum, s) => sum + s.prevSegSec, 0);
            const baseRatio = targetSeconds / historicalTotal;

            let tempSegments = baseSegments.map((seg, i) => {
                const position = (i / (baseSegments.length - 1)) * 2 - 1;
                const splitMultiplier = 1 + (position * sliderVal);
                return { ...seg, rawScaledSec: seg.prevSegSec * baseRatio * splitMultiplier };
            });

            const rawTotalTime = tempSegments.reduce((sum, s) => sum + s.rawScaledSec, 0);
            const correctionFactor = targetSeconds / rawTotalTime;

            let cumulativeSec = 0;
            activeSegments = tempSegments.map(seg => {
                const finalSegSec = Math.round(seg.rawScaledSec * correctionFactor);
                cumulativeSec += finalSegSec;
                
                const timeRatio = finalSegSec / seg.prevSegSec;
                const newPower = Math.round(seg.prevWatts * (1 / timeRatio));

                return { ...seg, targetCumSec: cumulativeSec, targetPower: newPower };
            });

            document.getElementById('main-title').innerText = `${currentClimb.name} (${formatTime(targetSeconds)})`;
            resetRide();
            renderList();
        }

        // --- 5. UI & Ride Logic ---
        function resetRide() {
            clearInterval(timerInterval);
            timerInterval = null;
            startTime = null;
            currentActiveIndex = 0;
            actualCumSecData = new Array(activeSegments.length).fill(null);
            trendData = new Array(activeSegments.length).fill(null);
            
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('main-delta').innerText = "";
            document.getElementById('startBtn').style.backgroundColor = 'var(--zwift-orange)';
            document.getElementById('startBtn').innerText = "START";
            
            if(pacingTrendChart) {
                pacingTrendChart.data.datasets[0].data = trendData;
                pacingTrendChart.update();
            }
        }

        function startRide() {
            if (!isDataLoaded || timerInterval) return; 
            startTime = Date.now();
            document.getElementById('startBtn').style.backgroundColor = '#334155';
            document.getElementById('startBtn').innerText = "RIDING";
            renderActionDiv(currentActiveIndex); 
            
            timerInterval = setInterval(() => {
                const elapsedSec = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = formatTime(elapsedSec);
            }, 1000);
        }

        function recordSplit(index) {
            if (!startTime || index !== currentActiveIndex) return; 
            const currentCumSec = Math.floor((Date.now() - startTime) / 1000);
            actualCumSecData[index] = currentCumSec;
            
            const splitDelta = activeSegments[index].targetCumSec - currentCumSec;
            trendData[index] = splitDelta;
            
            const deltaEl = document.getElementById('main-delta');
            deltaEl.innerText = splitDelta >= 0 ? `-${formatTime(splitDelta)}` : `+${formatTime(Math.abs(splitDelta))}`;
            deltaEl.className = splitDelta >= 0 ? "ahead" : "behind";
            
            currentActiveIndex = index + 1; 
            if (pacingTrendChart) pacingTrendChart.update();
            renderList();
        }

        function renderActionDiv(i) {
            const actionDiv = document.getElementById(`action-${i}`);
            if (!actionDiv) return;

            if (actualCumSecData[i] !== null) {
                const delta = activeSegments[i].targetCumSec - actualCumSecData[i];
                let resTxt = delta >= 0 ? `-${formatTime(delta)} Ahead` : `+${formatTime(Math.abs(delta))} Behind`;
                let resCls = delta >= 0 ? 'ahead' : 'behind';
                
                actionDiv.innerHTML = `
                    <div class="result-container">
                        <div style="font-weight:bold">${formatTime(actualCumSecData[i])}</div>
                        <div class="${resCls}">${resTxt}</div>
                    </div>
                `;
            } else if (i === currentActiveIndex && isDataLoaded) {
                const disabledState = !startTime ? 'disabled' : '';
                actionDiv.innerHTML = `<button class="split-btn" ${disabledState} onclick="recordSplit(${i})">Split</button>`;
            } else {
                actionDiv.innerHTML = `<button class="split-btn" disabled>Split</button>`;
            }
        }

        function renderList() {
            const list = document.getElementById('segmentList');
            list.innerHTML = '';
            let runningPrevCumSec = 0;

            activeSegments.forEach((seg, index) => {
                const prevTargetCumSec = index > 0 && activeSegments[index-1].targetCumSec !== null ? activeSegments[index-1].targetCumSec : 0;
                const targetSegSec = seg.targetCumSec !== null ? (seg.targetCumSec - prevTargetCumSec) : null;
                
                if (seg.prevSegSec !== null) runningPrevCumSec += seg.prevSegSec;

                const targetTimeStr = seg.targetCumSec !== null ? formatTime(seg.targetCumSec) : "--:--";
                const targetSegTimeStr = targetSegSec !== null ? formatTime(targetSegSec) : "--:--";
                const targetPowerStr = seg.targetPower !== null ? seg.targetPower + 'W' : '--W';
                
                const prevTimeStr = seg.prevSegSec !== null ? formatTime(runningPrevCumSec) : "--:--";
                const prevSegTimeStr = seg.prevSegSec !== null ? formatTime(seg.prevSegSec) : "--:--";
                const prevPowerStr = seg.prevWatts !== null ? seg.prevWatts + 'W' : '--W';

                const div = document.createElement('div');
                div.className = 'segment';
                div.innerHTML = `
                    <div class="segment-info">
                        <div class="segment-name">${seg.name}</div>
                        <div class="segment-target">Target: ${targetTimeStr} (${targetSegTimeStr}) @ ${targetPowerStr}</div>
                        <div class="prev-data-row">Prev: ${prevTimeStr} (${prevSegTimeStr}) @ ${prevPowerStr}</div>
                    </div>
                    <div class="segment-action" id="action-${index}"></div>
                `;
                list.appendChild(div);
                renderActionDiv(index); 
            });
            initCharts();
        }

        function initCharts() {
            if(pacingTrendChart) pacingTrendChart.destroy();
            const ctxTrend = document.getElementById('pacingTrendChart').getContext('2d');
            const chartLabels = activeSegments.map((seg, i) => i === 0 ? "Start" : i === activeSegments.length - 1 ? "Finish" : "S" + (i));
            
            pacingTrendChart = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Time Ahead/Behind', data: trendData,
                        borderColor: '#fc6719', backgroundColor: 'rgba(252, 103, 25, 0.15)',
                        borderWidth: 2, pointBackgroundColor: '#fff', fill: true, tension: 0.1
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } }, x: { ticks: { color: '#64748b' }, grid: { display: false } } }
                }
            });
        }

        // Kick off the app
        loadSegmentsConfig();

    </script>
</body>
</html>
