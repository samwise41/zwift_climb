<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Route Pacer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/pacer.css?v=2">
</head>
<body>

    <div class="top-dashboard" style="position: relative;">
        
        <div class="header-row" style="margin-bottom: 5px;">
            <h2><span id="title-text">Universal Pacer</span></h2>
            <div id="strava-status" class="status-text"></div>
            <a href="index.html" style="color: var(--target-blue); text-decoration: none; font-weight: bold; font-size: 0.9em; margin-left: 10px;">🔙 Go to Alpe</a>
        </div>
        
        <div id="settings-container" style="margin-bottom: 15px;">
            <div id="data-settings-box" class="calculator-box" style="display: flex; margin-top: 10px; background-color: #f8fafc; margin-bottom: 0;">
                
                <div class="calc-row">
                    <label style="font-weight: bold;">Select Route:</label>
                    <select id="routeSelect" class="calc-input"></select>
                </div>

                <div class="calc-row" id="slicer-row">
                    <label style="font-weight: bold;">Slice Method:</label>
                    <select id="sliceSelect" class="calc-input">
                        <option value="1.0">Every 1.0 km</option>
                        <option value="0.5">Every 0.5 km</option>
                        <option value="1.609">Every 1.0 mile</option>
                        <option value="0.804">Every 0.5 mile</option>
                        <option value="yolo" disabled>🔥 YOLO Mode (Coming Soon)</option>
                    </select>
                </div>

                <div class="calc-row" id="custom-upload-row" style="display: none;">
                    <input type="file" id="gpxInput" accept=".gpx" style="max-width: 200px;">
                </div>

                <div class="calc-row">
                    <button id="fetchBtn" class="calc-btn" style="background-color: var(--zwift-orange);" onclick="loadAndSliceRoute()">Load & Slice Route</button>
                </div>

            </div>
        </div>

        <div class="dashboard-grid">
            <div class="control-card" style="position: relative;">
                <div>
                    <div class="control-row">
                        <label style="font-weight: bold; font-size: 1.1em;">Target Time:</label>
                        <input type="text" inputmode="numeric" id="targetTimeInput" class="calc-input" placeholder="00:00" value="30:00" style="text-align: center; max-width: 90px; font-size: 1.1em;" oninput="applyNewTarget()">
                    </div>
                    
                    <div class="control-row time-display-row">
                        <div style="font-size: 1.4em; font-weight: bold; color: #0f172a;">Current Time</div>
                        <div class="timer-values">
                            <div id="timer">00:00</div>
                            <div id="main-delta"></div>
                        </div>
                    </div>
                </div>
                
                <div class="control-btns centered-btns">
                    <button id="resetBtn" onclick="resetRideProgress()" style="display: none;">RESET</button>
                    <button id="startBtn" onclick="startRide()" disabled>START</button>
                </div>
            </div>
        </div>
    </div>

    <div id="trim-instructions" style="display: none; text-align: center; color: #f44336; font-size: 0.85em; margin-bottom: 10px;">
        <em>Did your GPX file include a descent? Tap the 🗑️ icon to trim unwanted splits before you start!</em>
    </div>

    <div id="segmentList"></div>

    <script src="js/universal.js?v=2"></script>
    
</body>
</html>
